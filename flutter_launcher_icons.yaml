flutter_launcher_icons:
  # ── Android adaptive icon (API 26+) ──────────────────────────────────────
  # Adaptive icons have a foreground layer (108×108dp canvas) and a
  # background layer. The outer 18dp on each side is the "bleed zone" that
  # gets masked by the launcher shape (circle, squircle, etc.).
  # Safe zone = inner 72dp × 72dp (0.667 of total canvas).
  # To avoid cropping: keep artwork within 66% of canvas in each dimension.
  android: true                     # generates ic_launcher and related res
  adaptive_icon_background: "assets/simply_spectrum_bg1024.png"    # transparent PNG
  adaptive_icon_foreground: "assets/simply_spectrum1024.png"  # artwork with 20% padding
  image_path_android: "assets/simply_spectrum1024.png"

  # ── iOS (keeps existing behaviour) ───────────────────────────────────────
  ios: true
  image_path_ios: "assets/simply_spectrum1024.png"
  # ── Legacy Android (API < 26 fallback) ───────────────────────────────────
  # Uses the original PNG scaled to fit a standard square icon with
  # 10% padding so nothing is clipped.
  min_sdk_android: 21
  # ── Web (disabled) ───────────────────────────────────────────────────────
  web:
    generate: false
